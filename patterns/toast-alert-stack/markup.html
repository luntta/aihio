<div aria-live="polite" data-aihio-intent="layout status">
  <aihio-alert data-aihio-intent="alert informational">
    <div slot="title">Deployment finished</div>
    <div slot="description">Customer portal v18 is now live in production.</div>
  </aihio-alert>

  <aihio-alert data-aihio-intent="alert status">
    <div slot="title">Usage report ready</div>
    <div slot="description">A new CSV export is available in Billing.</div>
  </aihio-alert>

  <aihio-alert data-aihio-intent="alert" variant="destructive">
    <div slot="title">Webhook delivery failed</div>
    <div slot="description">Three retries have failed for the Slack incident channel.</div>
  </aihio-alert>
</div>
