<aihio-card data-aihio-intent="surface">
  <aihio-card-header>
    <aihio-card-title>Email me a sign-in link</aihio-card-title>
    <aihio-card-description>We will send a one-time login link to your inbox.</aihio-card-description>
  </aihio-card-header>
  <aihio-card-content>
    <form novalidate>
      <label>
        <span>Email</span>
        <aihio-input
          data-aihio-intent="form-field text-entry"
          type="email"
          placeholder="you@example.com"
        ></aihio-input>
      </label>
    </form>
  </aihio-card-content>
  <aihio-card-footer>
    <aihio-button data-aihio-intent="secondary-action" variant="outline">Use password instead</aihio-button>
    <aihio-button data-aihio-intent="primary-action">Send magic link</aihio-button>
  </aihio-card-footer>
</aihio-card>
