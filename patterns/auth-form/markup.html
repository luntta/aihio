<aihio-card data-aihio-intent="surface">
  <aihio-card-header>
    <aihio-card-title>Sign in</aihio-card-title>
    <aihio-card-description>Use your work email and password to continue.</aihio-card-description>
  </aihio-card-header>
  <aihio-card-content>
    <form novalidate>
      <label>
        <span>Email</span>
        <aihio-input
          data-aihio-intent="form-field text-entry"
          type="email"
          placeholder="you@example.com"
        ></aihio-input>
      </label>

      <label>
        <span>Password</span>
        <aihio-input
          data-aihio-intent="form-field text-entry"
          type="password"
        ></aihio-input>
      </label>
    </form>
  </aihio-card-content>
  <aihio-card-footer>
    <aihio-button data-aihio-intent="secondary-action" variant="outline">Forgot password</aihio-button>
    <aihio-button data-aihio-intent="primary-action">Sign in</aihio-button>
  </aihio-card-footer>
</aihio-card>
