<section data-aihio-intent="form-field">
  <label>
    <span>Password</span>
    <aihio-input
      data-aihio-intent="form-field text-entry"
      type="password"
      error
      aria-describedby="password-error"
    ></aihio-input>
  </label>

  <p id="password-error">Password must include at least 12 characters and one symbol.</p>

  <aihio-alert data-aihio-intent="alert" variant="destructive">
    <div slot="title">Password is too weak</div>
    <div slot="description">Update the field above, then resubmit the form.</div>
  </aihio-alert>

  <div>
    <aihio-button data-aihio-intent="secondary-action" variant="outline">Cancel</aihio-button>
    <aihio-button data-aihio-intent="primary-action">Save password</aihio-button>
  </div>
</section>
