<aihio-dialog data-aihio-intent="overlay modal dismissible" open>
  <aihio-dialog-header>
    <aihio-dialog-title>Delete project?</aihio-dialog-title>
    <aihio-dialog-description>
      This permanently removes project access, deploy history, and notification rules.
    </aihio-dialog-description>
  </aihio-dialog-header>
  <aihio-dialog-footer>
    <aihio-button data-aihio-intent="secondary-action" variant="outline">Cancel</aihio-button>
    <aihio-button data-aihio-intent="destructive-action" variant="destructive">Delete project</aihio-button>
  </aihio-dialog-footer>
</aihio-dialog>
